name: Deploy → Production (Master)

on:
  push:
    branches: ["master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_IMAGE_NAME: masters-app
  TARGET_DIR: masters_app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            NEXT_PUBLIC_BOT_NAME=${{ secrets.NEXT_PUBLIC_BOT_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Target Directory Exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          use_insecure_cipher: true
          script: mkdir -p ~/${{ env.TARGET_DIR }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/${{ env.TARGET_DIR }}"
          strip_components: 0
          use_insecure_cipher: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          use_insecure_cipher: true
          script: |
            cd ~/${{ env.TARGET_DIR }}
            
            # Настройка переменных окружения для Docker Compose
            export DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
            export APP_VERSION=${{ github.sha }}
            
            # Поднимаем сеть если её нет
            docker network create proxy_network 2>/dev/null || true

            # Обновляем образ и перезапускаем
            docker-compose pull app
            docker-compose up -d --remove-orphans

            # Ждём БД и запускаем миграции
            echo "Waiting for database..."
            sleep 10
            docker exec masters_app npx prisma migrate deploy

            # Очистка
            docker image prune -af

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: Telegram Notification
        run: |
          BUILD_STATUS="${{ needs.build-and-push.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [[ "$BUILD_STATUS" == "success" && "$DEPLOY_STATUS" == "success" ]]; then
            ICON="✅"
            STATUS_TEXT="Masters App: Деплой успешен 🚀"
          else
            ICON="❌"
            STATUS_TEXT="Masters App: Ошибка деплоя ⚠️"
          fi

          MESSAGE="${ICON} *${{ env.DOCKER_IMAGE_NAME }}*
          ${STATUS_TEXT}

          📦 Ветка: \`${{ github.ref_name }}\`
          🔨 Коммит: \`${{ github.sha }}\`
          👤 Автор: ${{ github.actor }}
          🔗 [Просмотр логов](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"
