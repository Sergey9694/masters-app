name: Deploy → VPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  PROJECT_NAME: "masters-app"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Здесь нужно будет добавить доступы в GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/${{ env.PROJECT_NAME }}"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/${{ env.PROJECT_NAME }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Notify Telegram
        if: always()
        run: |
          DEPLOY_STATUS="${{ job.status }}"
          ICON="✅"
          if [[ "$DEPLOY_STATUS" != "success" ]]; then ICON="🚨"; fi
          
          MESSAGE="${ICON} *${{ env.PROJECT_NAME }}*
          Статус: \`${DEPLOY_STATUS}\`
          Ветка: \`${{ github.ref_name }}\`
          🔨 Коммит: \`${{ github.sha }}\`
          👤 Автор: ${{ github.actor }}"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"
