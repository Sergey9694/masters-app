name: Deploy → Production (Master)

on:
  push:
    branches: ["master", "refactor/uslugi-ryadom"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"
  DOCKER_IMAGE_NAME: masters-app
  TARGET_DIR: masters_app

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_SECRET: "ci_auth_secret_32_chars_minimum_value"
      AUTH_URL: "http://127.0.0.1:3000"
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/uslugi_ci?schema=public"
      REDIS_URL: "redis://127.0.0.1:6380"
      ENCRYPTION_KEY: "a1b2c3d4a1b2c3d4a1b2c3d4a1b2c3d4a1b2c3d4a1b2c3d4a1b2c3d4a1b2c3d4"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_BOT_NAME: "ci_bot"
      NEXT_PUBLIC_BOT_ID: "123456789"
      TELEGRAM_BOT_TOKEN: "ci:telegram-token"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --include=dev --include=optional
      - run: npm exec --workspace=@uslugi/web -- prisma generate --schema=prisma/schema.prisma
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build --workspace=@uslugi/web

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            NEXT_PUBLIC_BOT_NAME=${{ secrets.NEXT_PUBLIC_BOT_NAME }}
            NEXT_PUBLIC_BOT_ID=${{ secrets.NEXT_PUBLIC_BOT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Target Directory Exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          use_insecure_cipher: true
          script: mkdir -p ~/${{ env.TARGET_DIR }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/${{ env.TARGET_DIR }}"
          strip_components: 0
          use_insecure_cipher: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          use_insecure_cipher: true
          script: |
            cd ~/${{ env.TARGET_DIR }}
            
            # Настройка переменных окружения для Docker Compose
            export DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
            export APP_VERSION=${{ github.sha }}
            
            # Поднимаем сеть если её нет
            docker network create proxy_network 2>/dev/null || true

            # Обновляем образ и перезапускаем
            docker compose pull app
            docker compose up -d --remove-orphans --force-recreate

            # Ждём запуска (миграции выполняются автоматически через startup.js)
            echo "Waiting for app startup..."
            sleep 15

            # Очистка
            docker image prune -af

  notify:
    runs-on: ubuntu-latest
    needs: [verify, build-and-push, deploy]
    if: always()
    steps:
      - name: Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERIFY_STATUS="${{ needs.verify.result }}"
          BUILD_STATUS="${{ needs.build-and-push.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [[ "$VERIFY_STATUS" == "success" && "$BUILD_STATUS" == "success" && "$DEPLOY_STATUS" == "success" ]]; then
            ICON="✅"
            STATUS_TEXT="Masters App: Деплой успешен 🚀"
          else
            ICON="❌"
            STATUS_TEXT="Masters App: Ошибка деплоя ⚠️"
          fi

          MESSAGE="${ICON} *${{ env.DOCKER_IMAGE_NAME }}*
          ${STATUS_TEXT}

          🧪 Проверки: \`${VERIFY_STATUS}\`
          📦 Ветка: \`${{ github.ref_name }}\`
          🔨 Коммит: \`${{ github.sha }}\`
          👤 Автор: ${{ github.actor }}
          🔗 [Просмотр логов](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"
