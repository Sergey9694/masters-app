# --- СЕТЬ ДЛЯ ГЛОБАЛЬНОГО ПРОКСИ ---
networks:
    proxy_network:
        external: true

services:
    # --- БАЗА ДАННЫХ (PostgreSQL + PostGIS) ---
    db:
        image: postgis/postgis:15-3.3-alpine
        container_name: ${DB_CONTAINER_NAME:-uslugi_db}
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
            POSTGRES_DB: ${POSTGRES_DB:-uslugi_db}
        volumes:
            - ./postgres_data:/var/lib/postgresql/data
        ports:
            - "5435:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-uslugi_db}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - proxy_network

    # --- REDIS (кэш и адаптер Socket.io) ---
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        # ports:
        #     - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - proxy_network

    # --- ПРИЛОЖЕНИЕ (Next.js) ---
    app:
        container_name: ${APP_CONTAINER_NAME:-uslugi_web}
        # Используем masters-app, так как это точное название репозитория на Docker Hub.
        # Старое название (uslugi-ryadom) приводило к ошибке "Manifest not found".
        image: ${DOCKERHUB_IMAGE:-drobilenkos94/masters-app}:${APP_VERSION:-latest}
        # build:
        #     context: .
        #     dockerfile: Dockerfile
        restart: always
        env_file: .env
        environment:
            DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin_pass}@${DB_CONTAINER_NAME:-uslugi_db}:5432/${POSTGRES_DB:-uslugi_db}?schema=public"
            NODE_ENV: production
            AUTH_SECRET: ${AUTH_SECRET}
            AUTH_SERVER_SECRET: ${AUTH_SERVER_SECRET}
            AUTH_URL: ${AUTH_URL}
            AUTH_TRUST_HOST: "true"
            NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_BOT_ID: ${TELEGRAM_BOT_ID}
            DADATA_API_KEY: ${DADATA_API_KEY}
            ADMIN_EMAIL: ${ADMIN_EMAIL}
            ADMIN_PASSWORD: ${ADMIN_PASSWORD}
            REDIS_URL: "redis://redis:6379"
        volumes:
            - ./uploads:/app/uploads
        networks:
            - proxy_network
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
            interval: 20s
            timeout: 10s
            retries: 10
            start_period: 120s

    # --- АВТОМАТИЧЕСКИЕ БЭКАПЫ ---
    db-backup:
        image: postgis/postgis:15-3.3-alpine
        container_name: ${BACKUP_CONTAINER_NAME:-uslugi_db_backup}
        restart: unless-stopped
        environment:
            PGHOST: ${DB_CONTAINER_NAME:-uslugi_db}
            PGUSER: ${POSTGRES_USER:-admin}
            PGPASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
            PGDATABASE: ${POSTGRES_DB:-uslugi_db}
        volumes:
            - ./backups:/backups
        networks:
            - proxy_network
        depends_on:
            db:
                condition: service_healthy
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
              echo "0 4 * * * pg_dump -Fc > /backups/uslugi_$$(date +\%Y\%m\%d_\%H\%M).dump && find /backups -name '*.dump' -mtime +7 -delete && echo Backup done" > /etc/crontabs/root
              crond -f -l 2
